version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chapeacao_postgres
    environment:
      POSTGRES_DB: chapeacao_os_guri
      POSTGRES_USER: chapeacao
      POSTGRES_PASSWORD: chapeacao_senha_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chapeacao"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chapeacao_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: chapeacao_network
